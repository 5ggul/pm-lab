name: collect-arb
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: collect-arb
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: negRisk paper scan (single cycle)
        run: |
          mkdir -p data
          cd data
          python ../paper_trader.py --once --max-hours 24 --min-liquidity 10000 --size 10 --verify-limit 10
      - name: commit data
        run: |
          git config user.name "pm-lab-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data
          git diff --cached --quiet && exit 0
          git commit -m "data: arb scan $(date -u +%FT%TZ)"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase --autostash
          done
          git push
